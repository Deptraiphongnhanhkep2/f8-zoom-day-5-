<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register Form</title>
        <link rel="stylesheet" href="./reset.css" />
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <form action="" autocomplete="off">
            <h1 class="form-title">Register</h1>
            <div class="form-group">
                <label for="display-name" class="form-label required"
                    >Display Name</label
                >
                <input
                    type="text"
                    id="display-name"
                    placeholder="Display Name..."
                    class="input-field"
                    spellcheck="false"
                    name="display-name"
                    required
                />
            </div>
            <div class="form-group">
                <label for="email" class="form-label required">Email</label>
                <input
                    type="email"
                    id="email"
                    class="input-field"
                    placeholder="Email..."
                    spellcheck="false"
                    name="email"
                    required
                />
            </div>
            <div class="form-group">
                <label for="phone" class="form-label required">Phone Number</label>
                <input
                    type="tel"
                    id="phone"
                    class="input-field"
                    placeholder="Phone Number..."
                    spellcheck="false"
                    name="phone"
                    required
                />
            </div>
            <div class="form-group">
                <label for="password" class="form-label required">Password</label>
                <input
                    type="password"
                    id="password"
                    class="input-field"
                    placeholder="Password..."
                    name="password"
                    required
                />
            </div>
            <div class="form-group">
                <label for="confirm-password" class="form-label required"
                    >Confirm Password</label
                >
                <input
                    type="password"
                    id="confirm-password"
                    class="input-field"
                    placeholder="Confirm Password..."
                    name="confirm-password"
                    required
                />
            </div>
            <div class="form-group">
                <label class="form-label">Gender</label>
                <label class="checkbox"
                    ><input
                        type="radio"
                        name="gender"
                        value="male"
                        checked
                    />Male</label
                >
                <label class="checkbox"
                    ><input
                        type="radio"
                        name="gender"
                        value="female"
                    />Female</label
                >
                <label class="checkbox"
                    ><input
                        type="radio"
                        name="gender"
                        value="other"
                    />Other</label
                >
            </div>
            <div class="form-group">
                <label for="date-of-birth" class="form-label"
                    >Date Of Birth</label
                >
                <input type="date" id="date-of-birth" name="date-of-birth" />
            </div>
            <div class="form-group">
                <label for="address" class="form-label">Address</label>
                <input
                    type="text"
                    name="address"
                    class="input-field"
                    spellcheck="false"
                    id="address"
                />
            </div>
            <div class="form-group">
                <label for="avatar" class="form-label"
                    >Profile Picture (Avatar)</label
                >
                <label for="avatar"
                    ><img
                        src="./assets/avatar.png"
                        class="avatar-img"
                        alt="Avatar Placeholder"
                /></label>
                <input
                    type="file"
                    id="avatar"
                    name="avatar"
                    hidden
                    accept="image/*"
                />
            </div>
            <div class="form-group">
                <label class="form-label">Communication Preferences</label>
                <label class="checkbox"
                    ><input type="checkbox" name="newsletter" value="sub" />
                    Subscribe to Newsletter</label
                >
                <label class="checkbox"
                    ><input type="checkbox" name="newsletter" value="promo" />
                    Receive Promotional Emails</label
                >
                <label class="checkbox"
                    ><input type="checkbox" name="newsletter" value="update" />
                    Get Product Updates</label
                >
            </div>

            <button class="btn">Register Now</button>
        </form>
    </body>
</html>
